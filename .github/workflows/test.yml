name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# The chain-indexer's Cargo.toml has path deps on `../sqlx-ra-tls`
# and `../ra-tls-parse` (sibling checkouts). Each job checks them
# out alongside this repo before invoking cargo. See the comment
# in the chain-indexer's root Cargo.toml for the rationale.
jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout teesql-chain-indexer
        uses: actions/checkout@v4
        with:
          path: teesql-chain-indexer
      - name: Checkout sibling sqlx-ra-tls
        uses: actions/checkout@v4
        with:
          repository: TeeSQL/sqlx-ra-tls
          path: sqlx-ra-tls
      - name: Checkout sibling ra-tls-parse
        uses: actions/checkout@v4
        with:
          repository: TeeSQL/ra-tls-parse
          path: ra-tls-parse
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # fmt-check only chain-indexer's own packages — `cargo fmt --all`
      # would also format the sibling sqlx-ra-tls/ra-tls-parse crates,
      # which are not owned by this repo.
      - name: cargo fmt
        working-directory: teesql-chain-indexer
        run: |
          cargo fmt --check \
            -p teesql-chain-indexer-attest \
            -p teesql-chain-indexer-core \
            -p teesql-chain-indexer-server \
            -p teesql-chain-indexer-abi \
            -p teesql-chain-indexer-views \
            -p teesql-chain-indexer

  clippy:
    name: cargo clippy -D warnings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout teesql-chain-indexer
        uses: actions/checkout@v4
        with:
          path: teesql-chain-indexer
      - name: Checkout sibling sqlx-ra-tls
        uses: actions/checkout@v4
        with:
          repository: TeeSQL/sqlx-ra-tls
          path: sqlx-ra-tls
      - name: Checkout sibling ra-tls-parse
        uses: actions/checkout@v4
        with:
          repository: TeeSQL/ra-tls-parse
          path: ra-tls-parse
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: teesql-chain-indexer
      - run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: teesql-chain-indexer

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout teesql-chain-indexer
        uses: actions/checkout@v4
        with:
          path: teesql-chain-indexer
      - name: Checkout sibling sqlx-ra-tls
        uses: actions/checkout@v4
        with:
          repository: TeeSQL/sqlx-ra-tls
          path: sqlx-ra-tls
      - name: Checkout sibling ra-tls-parse
        uses: actions/checkout@v4
        with:
          repository: TeeSQL/ra-tls-parse
          path: ra-tls-parse
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: teesql-chain-indexer
      - run: cargo test --workspace --no-fail-fast
        working-directory: teesql-chain-indexer
