[package]
name = "teesql-chain-indexer"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Attested Postgres-backed event log over an EVM RPC"

[[bin]]
name = "teesql-chain-indexer"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
toml = { workspace = true }
serde = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

teesql-chain-indexer-core   = { workspace = true }
teesql-chain-indexer-abi    = { workspace = true }
teesql-chain-indexer-views  = { workspace = true }
teesql-chain-indexer-attest = { workspace = true }
teesql-chain-indexer-server = { workspace = true }

sqlx = { workspace = true }
sqlx-ra-tls = { workspace = true }
futures = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
axum = { workspace = true }
tonic = { workspace = true }
hex = { workspace = true }

# Signed leader manifest discovery — used when
# `TEESQL_INDEXER_TARGET_HOST` is unset and the storage layer should
# follow `_teesql-leader.<cluster_uuid>.teesql.com` to whichever
# cluster member is currently primary. `sha3` + `k256` recover the
# manifest signer to compare against the operator-pinned address.
hickory-resolver = { workspace = true }
sha3 = { workspace = true }
k256 = { workspace = true }
